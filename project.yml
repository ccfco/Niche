name: Niche
options:
  bundleIdPrefix: com.ccfco
  developmentLanguage: zh-Hans
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # 自动更新框架。零 SPM 依赖红线的已批准例外（同 Clipin）：自研一键下载/EdDSA
  # 验签/原子替换/重启需上千行且易错，属"无该依赖做不出该功能"。
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0

settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.6"
    CURRENT_PROJECT_VERSION: 144
    # 本地开发用 ad-hoc 签名;不沙盒,GitHub Release 自分发时再换正式签名/公证
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    # 「显示简介」经 Apple Events 驱动访达(FinderGetInfo)需 automation entitlement;本地非 hardened
    # 被忽略,公证开 hardened runtime 时生效。放 sources 外(仓库根),不被当资源打包。
    CODE_SIGN_ENTITLEMENTS: Niche.entitlements
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Niche:
    type: application
    platform: macOS
    sources:
      - path: Sources/Niche
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccfco.Niche
        PRODUCT_NAME: Niche
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Niche/Info.plist
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  NicheTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/NicheTests
    dependencies:
      - target: Niche
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccfco.NicheTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Niche:
    build:
      targets:
        Niche: all
        NicheTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - NicheTests
